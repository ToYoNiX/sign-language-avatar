<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARSL Avatar</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/cwa/cwasa.css" />
    <script src="/cwa/allcsa.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #avatar-wrapper { width: 100%; height: 100%; }
    </style>
    <script>
        const ALLOWED_ORIGIN = "__ALLOWED_ORIGIN__";

        let playingTimeout;
        let stopRequested = false;
        let categories = {};

        fetch('/categories_files.json')
            .then(r => r.json())
            .then(data => {
                categories = data;
                postToParent({ type: 'ready' });
            });

        function postToParent(msg) {
            const target = ALLOWED_ORIGIN === '*' ? '*' : ALLOWED_ORIGIN;
            window.parent.postMessage(msg, target);
        }

        function playSiGML(sigmlURL) {
            CWASA.playSiGMLURL(window.location.origin + '/' + sigmlURL);
        }

        function sign(text) {
            stopRequested = false;
            const glosses = findGlosses(text);
            if (glosses.length === 0) {
                postToParent({ type: 'error', reason: 'no matching words found' });
                return;
            }
            playSequentially(glosses, 0);
        }

        function stop() {
            stopRequested = true;
            clearTimeout(playingTimeout);
        }

        function findGlosses(input) {
            const words = input.trim().split(/\s+/).filter(Boolean);
            const glosses = [];
            for (let i = 0; i < words.length; i++) {
                for (let len = 2; len >= 1; len--) {
                    if (i + len <= words.length) {
                        const candidate = words.slice(i, i + len).join(' ');
                        if (isValidGloss(candidate)) {
                            glosses.push(candidate);
                            i += len - 1;
                            break;
                        }
                    }
                }
            }
            return glosses;
        }

        function isValidGloss(gloss) {
            const req = new XMLHttpRequest();
            req.open('HEAD', '/sigml/' + gloss + '.sigml', false);
            req.send();
            return req.status === 200;
        }

        function playSequentially(glosses, index) {
            if (index >= glosses.length || stopRequested) return;
            playSiGML('sigml/' + glosses[index] + '.sigml');
            postToParent({ type: 'signing', word: glosses[index], index, total: glosses.length });
            playingTimeout = setTimeout(() => {
                if (index + 1 === glosses.length) postToParent({ type: 'done' });
                playSequentially(glosses, index + 1);
            }, 1650);
        }

        window.addEventListener('message', (event) => {
            if (ALLOWED_ORIGIN !== '*' && event.origin !== ALLOWED_ORIGIN) return;
            const { type, ...payload } = event.data;
            switch (type) {
                case 'sign': sign(payload.text); break;
                case 'stop': stop(); break;
            }
        });
    </script>
</head>
<body onload="CWASA.init();">
    <div id="avatar-wrapper">
        <div class="CWASAAvatar av0" style="width:100%;height:100%;"></div>
    </div>
</body>
</html>
