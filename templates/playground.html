<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SiGML Playground</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="cwa/cwasa.css" />
    <script src="cwa/allcsa.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #f4f4f4;
            height: 100vh;
            display: flex;
            flex-direction: row;
            gap: 12px;
            padding: 12px;
        }

        /* ── Avatar pane ── */
        #avatar-pane {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            min-width: 0;
        }

        .CWASAAvatar { width: 100%; height: 100%; }

        /* ── Editor pane ── */
        #editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        /* ── Shared panel card ── */
        .panel {
            background: #fff;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .hint {
            font-size: 12px;
            color: #bbb;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── Textarea ── */
        #sigmlInput {
            flex: 1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
            padding: 14px;
            border: none;
            border-radius: 8px;
            resize: none;
            background: #1e1e1e;
            color: #d4d4d4;
            outline: none;
            min-height: 0;
        }

        #sigmlInput:focus { outline: 2px solid #4a9eff; }

        /* ── Controls ── */
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            min-height: 44px;
        }

        .btn-primary { background: #4a9eff; color: #fff; }
        .btn-primary:hover { background: #2a7fdf; }

        .btn-secondary { background: #e8e8e8; color: #333; }
        .btn-secondary:hover { background: #d4d4d4; }

        #status {
            font-size: 13px;
            color: #aaa;
            margin-left: auto;
        }

        #status.error { color: #e05050; }
        #status.ok    { color: #4caf50; }

        /* ── Mobile: stack vertically ── */
        @media (max-width: 600px) {
            body { flex-direction: column; padding: 8px; gap: 8px; }

            #avatar-pane { flex: 0 0 42vh; }

            #editor-pane { flex: 1; }

            .hint { display: none; }
        }
    </style>
</head>
<body onload="CWASA.init();">

    <div id="avatar-pane">
        <div class="CWASAAvatar av0"></div>
    </div>

    <div id="editor-pane">

        <div class="panel">
            <span class="panel-label">SiGML Playground</span>
            <span class="hint">Ctrl + Enter to play</span>
        </div>

        <textarea id="sigmlInput" spellcheck="false" placeholder="Paste your SiGML here…

Example:
<sigml>
  <hns_sign gloss=&quot;hello&quot;>
    <hamnosys_nonmanual></hamnosys_nonmanual>
    <hamnosys_manual>
      <hamflathand/>
      <hampalml/>
      <hamneutralspace/>
      <hamsymmlr/>
      <hamnomotion/>
    </hamnosys_manual>
  </hns_sign>
</sigml>"></textarea>

        <div class="panel">
            <button class="btn-primary" onclick="playSiGML()">Play</button>
            <button class="btn-secondary" onclick="clearInput()">Clear</button>
            <span id="status"></span>
        </div>

    </div>

    <script>
        function setStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = type || '';
        }

        function playSiGML() {
            const text = document.getElementById('sigmlInput').value.trim();
            if (!text) { setStatus('Paste some SiGML first.', 'error'); return; }
            try {
                new DOMParser().parseFromString(text, 'application/xml');
            } catch (e) {
                setStatus('Invalid XML: ' + e.message, 'error');
                return;
            }
            setStatus('Playing…', '');
            CWASA.playSiGMLText(text);
        }

        function clearInput() {
            document.getElementById('sigmlInput').value = '';
            setStatus('', '');
        }

        document.getElementById('sigmlInput').addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                playSiGML();
            }
        });

        CWASA.addHook('sigmlloaded', () => setStatus('Ready.', 'ok'));
        CWASA.addHook('avatarsign',  () => setStatus('Signing…', 'ok'));
        CWASA.addHook('animidle',    () => setStatus('Done.', 'ok'));
    </script>
</body>
</html>
