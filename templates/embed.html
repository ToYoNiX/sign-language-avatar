<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ArSL Avatar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="cwa/cwasa.css" />
    <script src="cwa/allcsa.js"></script>
    <script src="avatar.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #avatar-wrapper { width: 100%; height: 100%; }
    </style>
    <script>
        const ALLOWED_ORIGIN = "__ALLOWED_ORIGIN__";

        function postToParent(msg) {
            window.parent.postMessage(msg, ALLOWED_ORIGIN === '*' ? '*' : ALLOWED_ORIGIN);
        }

        Avatar.ready.then(() => {
            postToParent({ type: 'ready' });

            window.addEventListener('message', event => {
                if (ALLOWED_ORIGIN !== '*' && event.origin !== ALLOWED_ORIGIN) return;
                const { type, ...payload } = event.data;
                if (type === 'sign') {
                    Avatar.sign(payload.text, {
                        onSign:    (word, index, total) => postToParent({ type: 'signing', word, index, total }),
                        onDone:    ()                   => postToParent({ type: 'done' }),
                        onNoMatch: ()                   => postToParent({ type: 'error', reason: 'no matching words found' }),
                    });
                } else if (type === 'stop') {
                    Avatar.stop();
                }
            });
        });
    </script>
</head>
<body onload="CWASA.init();">
    <div id="avatar-wrapper">
        <div class="CWASAAvatar av0" style="width:100%;height:100%;"></div>
    </div>
</body>
</html>
