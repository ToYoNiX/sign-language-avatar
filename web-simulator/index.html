<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D ArSL Avatar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="cwa/cwasa.css" />
    <script src="cwa/allcsa.js"></script>
    <script src="avatar.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Avatar ── */
        #avatar-wrapper {
            flex: 1;
            min-height: 0;
            background: #fff;
        }

        .CWASAAvatar { width: 100%; height: 100%; }

        /* ── Bottom panel ── */
        #bottom-panel {
            flex-shrink: 0;
            display: flex;
            height: 38vh;
            min-height: 160px;
            border-top: 1px solid #ddd;
            background: #f9f9f9;
            gap: 8px;
            padding: 8px;
        }

        /* ── Shared list box ── */
        .list-box {
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            overflow: hidden;
        }

        .list-box-label {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            background: #f4f4f4;
            border-bottom: 1px solid #ddd;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .list-box-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .list-item {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-bottom: 1px solid #f0f0f0;
            background: none;
            text-align: right;
            font-size: 14px;
            color: #222;
            cursor: pointer;
            white-space: nowrap;
        }

        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: #e8f0fe; color: #1a5faa; }

        .list-item.selected {
            background: #0078d4;
            color: #fff;
        }

        /* ── Sizing ── */
        #cat-box  { width: 140px; flex-shrink: 0; }
        #word-box { flex: 1; min-width: 0; }

        /* ── Mobile: stack vertically ── */
        @media (max-width: 540px) {
            #bottom-panel {
                flex-direction: column;
                height: 45vh;
            }

            #cat-box  { width: 100%; flex-shrink: 0; height: 38%; }
            #word-box { flex: 1; }
        }
    </style>
</head>

<body onload="CWASA.init();">

    <div id="avatar-wrapper">
        <div class="CWASAAvatar av0"></div>
    </div>

    <div id="bottom-panel">
        <div id="word-box" class="list-box">
            <div class="list-box-label">الكلمات</div>
            <div class="list-box-scroll" id="word-list"></div>
        </div>
        <div id="cat-box" class="list-box">
            <div class="list-box-label">الفئات</div>
            <div class="list-box-scroll" id="cat-list"></div>
        </div>
    </div>

    <script>
        let activeCat = null;
        let activeWord = null;

        Avatar.ready.then(() => {
            const catList = document.getElementById('cat-list');
            const dict = Avatar.dictionary;
            let firstEl = null;

            for (const cat in dict) {
                const btn = document.createElement('button');
                btn.className = 'list-item';
                btn.textContent = cat;
                btn.onclick = () => selectCategory(cat, btn);
                catList.appendChild(btn);
                if (!firstEl) firstEl = { cat, btn };
            }

            if (firstEl) selectCategory(firstEl.cat, firstEl.btn);
        });

        function selectCategory(cat, btn) {
            if (activeCat) activeCat.classList.remove('selected');
            activeCat = btn;
            btn.classList.add('selected');

            const wordList = document.getElementById('word-list');
            wordList.innerHTML = '';
            activeWord = null;

            Avatar.dictionary[cat].forEach(word => {
                const wb = document.createElement('button');
                wb.className = 'list-item';
                wb.textContent = word;
                wb.onclick = () => signWord(word, wb);
                wordList.appendChild(wb);
            });
        }

        function signWord(word, btn) {
            if (activeWord) activeWord.classList.remove('selected');
            activeWord = btn;
            btn.classList.add('selected');
            Avatar.stop();
            Avatar.sign(word, {
                onDone: () => btn.classList.remove('selected')
            });
        }
    </script>

</body>
</html>
